<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061E3C"/>
      <stop offset="25%" stop-color="#0F4A8A"/>
      <stop offset="55%" stop-color="#1A7FC1"/>
      <stop offset="78%" stop-color="#56B4D8"/>
      <stop offset="92%" stop-color="#A8D8EA"/>
      <stop offset="100%" stop-color="#E0F2FB"/>
