      <stop offset="20%" stop-color="#FFF8E0" stop-opacity="0.60"/>
      <stop offset="50%" stop-color="#C8E8F8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1A7FC1" stop-opacity="0"/>
