  <text x="340" y="322" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="#0C3D6B" style="fill:rgb(12, 61, 107);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:28px;font-weight:400;text-anchor:middle;dominant-baseline:auto">
    <tspan fill="#0C3D6B" style="fill:rgb(12, 61, 107);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:28px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Win</tspan><tspan fill="#E8893A" font-size="32" dy="-2" style="fill:rgb(232, 137, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:32px;font-weight:400;text-anchor:middle;dominant-baseline:auto">.</tspan><tspan fill="#0C3D6B" dy="2" style="fill:rgb(12, 61, 107);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:28px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Win</tspan>
  </text>

  <line x1="222" y1="337" x2="306" y2="337" stroke="#E8893A" stroke-width="0.9" opacity="0.55" style="fill:rgb(0, 0, 0);stroke:rgb(232, 137, 58);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="374" y1="337" x2="458" y2="337" stroke="#1A7FC1" stroke-width="0.9" opacity="0.55" style="fill:rgb(0, 0, 0);stroke:rgb(26, 127, 193);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="337" r="2.8" fill="#E8893A" opacity="0.85" style="fill:rgb(232, 137, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <text x="340" y="365" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-size="10.5" letter-spacing="4.5" fill="#1A6BAE" opacity="0.75" style="fill:rgb(26, 107, 174);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:Arial, Helvetica, sans-serif;font-size:10.5px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LONG-TERM PARTNERSHIP · IT CONSULTING</text>

