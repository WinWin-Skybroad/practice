    <!-- Gold W gradient: bright top, deep amber base -->
    <linearGradient id="gGold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#F0A030"/>
      <stop offset="100%" stop-color="#C05800"/>
    </linearGradient>

    <!-- Gold W shadow face -->
    <linearGradient id="gGoldDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B3A00"/>
      <stop offset="100%" stop-color="#C05800"/>
    </linearGradient>

    <!-- Blue-white W gradient -->
    <linearGradient id="gBlue" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#C2E8F8"/>
      <stop offset="100%" stop-color="#5AAED0"/>
    </linearGradient>

    <!-- Blue W shadow face -->
    <linearGradient id="gBlueDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A7BAA"/>
      <stop offset="100%" stop-color="#5AAED0"/>
    </linearGradient>

    <!-- Horizon bar -->
    <linearGradient id="hBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0"/>
      <stop offset="25%" stop-color="#FFE566" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#FFE566" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFE566" stop-opacity="0"/>
    </linearGradient>
  <mask id="imagine-text-gaps-3akb1c" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="460" fill="white"/><rect x="278.916748046875" y="288.6166687011719" width="121.46694946289062" height="41.67974853515625" fill="black" rx="2"/><rect x="138.36756896972656" y="353.20556640625" width="403.26483154296875" height="15.893253326416016" fill="black" rx="2"/></mask></defs>

