  <!-- ══════════════════════════════════════════
       WIN·WIN EMBLEM
       Two upright W shapes, overlapping at centre.
       Shared base point = fulcrum at (340, 218).

       W shape anatomy (upright, peaks UP):
         Left foot  → valley → inner peak → valley → right foot
         All feet sit on the horizon line (y=218).
         Peaks rise upward.

       GOLD W  — left-dominant, slightly offset left
       BLUE W  — right-dominant, slightly offset right
       They overlap in the middle third.
  ══════════════════════════════════════════ -->

  <!-- 
    GOLD W points (upright W, peaks pointing up):
      Left foot:   (220, 218)
      Left valley: (255, 178)  ← dips down (W valley goes DOWN in upright W)
      Centre peak: (290, 115)  ← rises UP
      Right valley:(325, 175)  ← dips back down
      Right foot:  (340, 218)  ← shared fulcrum

    Wait — a W goes: top-left → down-right → up-middle → down-right → top-right
    So upright W: left-high → dip → centre-low... no.

    Standard W letterform read left to right:
      Start high-left, go DOWN to first valley, UP to centre peak, DOWN to second valley, UP to high-right.

    Upright W with peaks UP:
      (x1,yTop) → (x2,yBot) → (x3,yMid) → (x4,yBot) → (x5,yTop)
      where yTop < yBot (top = smaller y = higher on screen)

    GOLD W — left side, peaks high:
      P1=(222,125)  P2=(255,205)  P3=(293,148)  P4=(325,205)  P5=(340,218) [shared base]
      But W has 2 high points and the shared base is the rightmost foot.
      Make it a filled polygon for 3D look.
  -->

  <!-- GOLD W — main face (lit side) -->
  <polygon points="&#10;    222,125&#10;    255,205&#10;    293,148&#10;    325,205&#10;    340,218&#10;    308,218&#10;    285,162&#10;    258,218&#10;    222,218&#10;  " fill="url(#gGold)" opacity="0.97" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.97;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- GOLD W — right shadow face (3D depth) -->
  <polygon points="&#10;    293,148&#10;    325,205&#10;    340,218&#10;    308,218&#10;    285,162&#10;  " fill="url(#gGoldDark)" opacity="0.75" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- GOLD W — left peak highlight (brightest face) -->
  <polygon points="&#10;    222,125&#10;    255,205&#10;    258,218&#10;    222,218&#10;  " fill="#FFF0A0" opacity="0.45" style="fill:rgb(255, 240, 160);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- GOLD W top edge highlight line -->
  <polyline points="222,125 255,205 293,148 325,205 340,218" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:round;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BLUE-WHITE W — main face (lit side) -->
  <!-- Mirror of gold W, right-dominant, slightly overlapping -->
  <polygon points="&#10;    458,125&#10;    425,205&#10;    387,148&#10;    355,205&#10;    340,218&#10;    372,218&#10;    395,162&#10;    422,218&#10;    458,218&#10;  " fill="url(#gBlue)" opacity="0.95" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BLUE W — left shadow face -->
  <polygon points="&#10;    387,148&#10;    355,205&#10;    340,218&#10;    372,218&#10;    395,162&#10;  " fill="url(#gBlueDark)" opacity="0.70" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BLUE W — right peak highlight -->
  <polygon points="&#10;    458,125&#10;    425,205&#10;    422,218&#10;    458,218&#10;  " fill="#FFFFFF" opacity="0.40" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- BLUE W top edge highlight -->
  <polyline points="458,125 425,205 387,148 355,205 340,218" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:round;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

